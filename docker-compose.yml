# OpenClaw Studio — docker-compose.yml
# Stack: Ollama (Qwen) + LiteLLM proxy + Open WebUI
#
# Services exposed:
#   :11434  — Ollama raw API
#   :4000   — LiteLLM proxy  (Anthropic-compatible, used by Claude Code)
#   :3000   — Open WebUI     (browser chat studio)
#
# Usage:
#   docker compose up -d
#   open http://<server-ip>:3000

version: "3.9"

volumes:
  ollama_data:
  openwebui_data:

services:

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: openclaw_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (comment out if CPU-only)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model bootstrap: pull Qwen on first start ──────────────────────────────
  ollama_init:
    image: ollama/ollama:latest
    container_name: openclaw_init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        OLLAMA_HOST=http://ollama:11434 ollama pull ${QWEN_MODEL:-qwen2.5-coder:7b} &&
        echo 'Model ready.'
      "
    volumes:
      - ollama_data:/root/.ollama

  # ── LiteLLM proxy (Anthropic API → Ollama) ────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: openclaw_litellm
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    environment:
      - LITELLM_MASTER_KEY=sk-local-free
      - OLLAMA_API_BASE=http://ollama:11434
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Open WebUI (browser-based AI studio) ──────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openclaw_studio
    restart: unless-stopped
    depends_on:
      - ollama
      - litellm
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Connect directly to Ollama for model list + streaming
      - OLLAMA_BASE_URL=http://ollama:11434
      # Also expose the LiteLLM proxy as an OpenAI-compatible endpoint
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-local-free
      # Studio branding
      - WEBUI_NAME=OpenClaw Studio
      - WEBUI_AUTH=false          # set to true and add users for multi-user
      - DEFAULT_MODELS=qwen2.5-coder:7b
    extra_hosts:
      - "host.docker.internal:host-gateway"

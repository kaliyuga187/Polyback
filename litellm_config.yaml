# litellm_config.yaml
# Proxies Anthropic-format API calls (used by Claude Code) → local Ollama
# Docs: https://docs.litellm.ai/docs/proxy/quick_start

model_list:
  # Primary: Qwen 2.5 Coder — best free coding model available via Ollama
  - model_name: claude-3-5-sonnet-20241022   # Claude Code uses this model name
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: claude-opus-4-6              # fallback alias
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: claude-sonnet-4-6            # fallback alias
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: claude-haiku-4-5-20251001    # fallback alias
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://localhost:11434

litellm_settings:
  drop_params: true           # drop unsupported Anthropic params silently
  num_retries: 3
  request_timeout: 600        # large context windows can be slow locally

general_settings:
  master_key: "sk-local-free" # any non-empty string; used as ANTHROPIC_API_KEY
  port: 4000
